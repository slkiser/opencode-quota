name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pnpm-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

      - name: Verify TypeScript version
        run: pnpm run verify:typescript-version

      - name: Verify v4 history privacy
        run: pnpm run verify:v4-history

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Verify four-surface parity
        run: pnpm run test:four-surfaces

      - name: Pack and audit exact npm artifact once
        run: pnpm run pack:release-package package-artifacts

      - name: Upload exact npm artifact
        uses: actions/upload-artifact@v7
        with:
          name: package-tarball
          path: package-artifacts/*
          if-no-files-found: error

  runtime-smoke:
    runs-on: ubuntu-latest
    needs: pnpm-quality

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Download exact npm artifact
        uses: actions/download-artifact@v8
        with:
          name: package-tarball
          path: package-artifacts

      - name: Smoke exact npm artifact on Node ${{ matrix.node-version }}
        run: node scripts/smoke-packed-package.mjs package-artifacts
